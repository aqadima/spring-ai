<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Spring AI Chat</title>
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <meta id="chatId" th:content="${chat != null ? chat.id : ''}">
</head>
<body>

    <!-- Overlay for sidebar / modals -->
    <div id="overlay" class="overlay"></div>

    <!-- Sidebar (sliding left panel) -->
    <aside id="sidebar">

        <th:block th:replace="~{fragment/sidebar_fragment::header()}">
        </th:block>

        <!-- New Chat Button -->
        <button class="btn-new-chat" id="newChatBtn" th:text="#{chat.button.new}">New chat</button>

        <th:block th:replace="~{fragment/sidebar_fragment::chatList(${chats}, ${chat?.id})}">
        </th:block>

        <!-- Sidebar Footer / User Block -->
        <th:block th:replace="~{fragment/sidebar_fragment::footer()}">
        </th:block>


    </aside>

    <!-- Main Content Area -->
    <div id="main-wrapper">

        <button id="sidebarToggle" class="hamburger-btn mobile-only">☰</button>

        <th:block th:if="${chat != null}">

            <th:block th:replace="~{fragment/chat_fragment::chatHeader(chatId=${chat.id}, chatTitle=${chat.title})}">
            </th:block>

            <!-- Messages area -->
            <th:block th:replace="~{fragment/chat_fragment::chatMessages(chat=${chat})}">
            </th:block>

            <!-- Input form -->
            <th:block th:replace="~{fragment/chat_fragment::chatInput(chat=${chat})}">
            </th:block>

        </th:block>

        <!-- No chat selected placeholder -->
        <th:block th:if="${chat == null}">
            <th:block th:replace="~{fragment/chat_fragment::noChatSelected()}">
            </th:block>
        </th:block>


    </div>

    <!-- ========== MODALS ========== -->
    <!-- New Chat Modal -->
    <th:block th:replace="~{fragment/modal_fragment::newChatModal()}">
    </th:block>

    <!-- Edit Chat Modal -->
    <th:block th:replace="~{fragment/modal_fragment::editChatModal()}">
    </th:block>

    <!-- Language Selection Modal -->
    <th:block th:replace="~{fragment/modal_fragment::changeLanguageModal()}">
    </th:block>

    <!-- Language Selection Modal -->
    <th:block th:replace="~{fragment/modal_fragment::archiveModal()}">
    </th:block>

    <!-- Scripts -->
    <script th:src="@{/js/external/marked.min.js}"></script>
    <script th:src="@{/js/external/purify.min.js}"></script>
    <script type="module" th:src="@{/js/app.js}"></script>

</body>
</html>
