services:

  postgres:
    container_name: spring-ai-pg
    image: ankane/pgvector:v0.5.0
    restart: unless-stopped
    environment:
      CREATE_DATABASES: ragdb
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      PGPASSWORD: ${PG_PASSWORD}
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${PG_USER:-postgres}", "-d", "postgres" ]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - spring_ai-network

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5433}:80"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit -1
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spring_ai-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ./ollama:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        sleep 2 &&
        ollama pull ${OLLAMA_CHAT_MODEL} &&
        ollama pull mxbai-embed-large &&
        wait
      "
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spring_ai-network


volumes:
  spring_ai_pgdata:
  spring_ai_pgadmin_data:

networks:
  spring_ai-network:
    driver: bridge
